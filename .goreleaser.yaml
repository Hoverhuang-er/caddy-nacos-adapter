# GoReleaser configuration for caddy-nacos-adapter
# Builds Caddy binaries with the nacos adapter via xcaddy,
# then packages them into release archives.
version: 2

project_name: caddy-nacos-adapter

env:
  - GOEXPERIMENT=jsonv2

before:
  hooks:
    - go mod tidy
    - .github/scripts/build.sh {{ .Version }}

builds:
  - id: caddy
    builder: prebuilt
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: caddy
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Hoverhuang-er
    name: caddy-nacos-adapter
  header: |
    ## Caddy Nacos Config Adapter v{{ .Version }}

    Pre-built Caddy binaries with the Nacos config adapter pre-loaded.

    ### Installation via xcaddy

    ```bash
    xcaddy build --with github.com/Hoverhuang-er/caddy-nacos-adapter@{{ .Version }}
    ```

    ### Usage

    ```bash
    export CNA="base64_encoded_credentials"
    caddy run --adapter nacos --config ./nacos.json
    ```

    See the [README](https://github.com/Hoverhuang-er/caddy-nacos-adapter#readme) for full documentation.

  footer: |
    ---

    *Automatically generated by GoReleaser*
